name: Pipeline de CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar mensaje
        run: echo "Hola, mundo!"

      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Construir app con node
        run: npm install

      - name: Verificar si app.js existe
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/app.js" ]; then
            echo "Error: app.js no encontrado"
            exit 1
          fi
          echo "app.js encontrado, continuando con el workflow"

      - name: Probar la aplicación con tests
        run: npm test
        
